{% extends "base.html" %}

{% block title %}Admin Login{% endblock %}

{% block body %}
<div style="max-width:380px;margin:4rem auto">
  <div class="page-header" style="border-bottom:none;margin-bottom:1.5rem">
    <div class="page-title">Admin Login</div>
  </div>

  <form method="POST" class="comment-form" style="gap:12px">
    <label>
      <span>Username</span>
      <input type="text" name="username" required autofocus
             placeholder="admin">
    </label>
    <label>
      <span>Password</span>
      <input type="password" name="password" required
             placeholder="••••••">
    </label>
    <button type="submit" class="btn btn-primary">Sign In</button>
  </form>
  <p class="hint" style="margin-top:1rem;text-align:center">
    Use <code>admin</code> / <code>admin123</code>
  </p>
</div>
{% endblock %}
